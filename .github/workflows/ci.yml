name: CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

# Cancel in-flight runs for the same ref when a new push lands. Saves CI time
# on rapid commits (e.g., quick fixup pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint both Go modules. Integration lives in a separate module
  # (internal/integration) so it has its own imports and needs its own run.
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - '.'
          - './internal/integration'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module == '.' && 'go.mod' || 'internal/integration/go.mod' }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  # Test on a matrix of supported Go versions so consumers on either can
  # trust core to work. Stable = oldest declared in go.mod; latest = next
  # major to catch forward-compat issues early.
  unit-tests:
    name: Unit Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.25', '1.26' ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - run: go mod download

      - name: Run unit tests
        run: go test -race -count=1 -timeout=2m -short -v ./...

  # Integration tests live in a separate Go module so testcontainers and
  # broker-client deps don't leak to consumers of core. Run them in that
  # module's working directory. Docker is preinstalled on ubuntu-latest
  # runners, testcontainers picks it up automatically.
  integration-tests:
    name: Integration Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: internal/integration/go.sum

      - name: Verify Docker availability
        run: docker version

      - name: Run integration tests
        working-directory: internal/integration
        run: go test -race -count=1 -timeout=15m -v ./...

  # Coverage combines unit + integration profiles so codecov's patch coverage
  # reflects what's actually tested. Integration tests live in a separate
  # module; -coverpkg=github.com/sergeyslonimsky/core/... measures the parent
  # module's packages from inside that module (replace directive makes it a
  # local dep). Upload as two files with distinct flags so codecov tracks
  # unit vs integration coverage separately while merging them for the
  # per-PR patch score.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      - name: Run unit tests with coverage
        run: go test -race -count=1 -timeout=2m -short -coverprofile=coverage-unit.out -covermode=atomic ./...

      - name: Verify Docker availability
        run: docker version

      - name: Run integration tests with coverage
        working-directory: internal/integration
        run: go test -race -count=1 -timeout=15m -coverpkg=github.com/sergeyslonimsky/core/... -coverprofile=coverage-integration.out -covermode=atomic ./...

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.out
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./internal/integration/coverage-integration.out
          flags: integration
          name: codecov-integration
          fail_ci_if_error: false
