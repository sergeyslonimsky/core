version: "2"
run:
  go: "1.25"
  allow-parallel-runners: true
linters:
  default: all
  disable:
    - noinlineerr
    - ireturn
    - wsl
  settings:
    gosec:
      # G117 flags exported struct fields whose name matches a secret
      # pattern (Password, Token, Secret, ...). Our Config structs
      # intentionally expose such fields — they are connection parameters,
      # not leaked secrets. Disabling the rule globally keeps the intent
      # visible in the config instead of spraying //nolint comments.
      excludes:
        - G117
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - '!**/*_a _file.go'
          allow:
            - $gostd
            - github.com/OpenPeeDeeP
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: not allowed
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package
    varnamelen:
      ignore-names:
        - id
        - db
        - q
        - tx
        - g
        - ch
        - v
        - ok
        - o
        - r
        - c
        - s
        - a
        - w
        - p
        - ss
        - rc
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: ^sql/
        linters:
          - revive
        text: "avoid package names that conflict"
      - path: (.+)_test.go
        linters:
          - funlen
          - goconst
          - varnamelen
          - exhaustruct
          - godox
          - err113
          - gosec
          - bodyclose
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/sergeyslonimsky/core)
      custom-order: true
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
